# =============================================================================
# Typst-Matrix 数据源：只改这里，无需写任何 Typst 代码
# =============================================================================
# Fork 本仓库后，把下面各项改成你的信息，保存并 Push。
# GitHub Actions 会自动编译并生成 PDF，在 Actions 页的 Artifacts 中下载即可。
# 本文件支持注释（以 # 开头），可整行删除或保留作说明。
# =============================================================================

# 姓名（简历/报告标题用）
name = "您的姓名"

# 职位或身份描述（如：全栈开发 / 算法工程师 / 本科·计算机科学与技术）
title = "您的职位或专业方向"

# ---------------------------------------------
# 联系方式（按需填写，不需要的项可删或留空）
# ---------------------------------------------
[contact]
phone = "您的手机号"
email = "your@example.com"
website = "https://your-site.com"
github = "github.com/username"

# ---------------------------------------------
# 教育背景（用于简历与部分报告模板）
# ---------------------------------------------
[education]
section_title = "教育背景"
school = "学校名称 (如：北京邮电大学)"
major = "学历 · 专业 (如：本科 · 计算机科学与技术)"
date = "YYYY.MM - YYYY.MM"
location = "城市"
# 多条亮点，每行一条
highlights = [
  "排名、奖学金、荣誉等",
  "核心课程：课程名1、课程名2"
]

# ---------------------------------------------
# 实习/工作与项目（部分模板会读取此处或从模板内联）
# ---------------------------------------------
[experience]
section_title = "实习与项目经历"
# 更多条目可在模板中直接写，或在此扩展

# ---------------------------------------------
# 竞赛与荣誉
# ---------------------------------------------
[honors]
section_title = "竞赛荣誉"
items = [
  "奖项一（含角色）",
  "奖项二",
  "认证名称"
]

# ---------------------------------------------
# 技能（按类填写，模板会按需选用）
# ---------------------------------------------
[skills]
section_title = "专业技能"
languages = "如：Python, C++, TypeScript"
frontend = "如：Vue, React"
backend = "如：Node.js, Linux"
tools = "如：Git, Docker, 算法"
